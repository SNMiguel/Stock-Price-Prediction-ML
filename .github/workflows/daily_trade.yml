name: Daily Trade Job

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET — 1 hour after NYSE close (4 PM ET)
    - cron: '30 21 * * 1-5'   # Mon–Fri only
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK VADER lexicon
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Run daily job
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          DB_URL:             ${{ secrets.DB_URL }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LIVE_TRADING:       ${{ secrets.LIVE_TRADING }}
        run: python -m jobs.daily_job
