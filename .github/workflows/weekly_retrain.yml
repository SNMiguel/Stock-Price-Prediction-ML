name: Weekly Model Retrain

on:
  schedule:
    # Every Sunday at 02:00 UTC — well outside market hours
    - cron: '0 2 * * 0'
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # Training can take a while

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK VADER lexicon
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Run train job
        env:
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:    ${{ secrets.ALPACA_BASE_URL }}
          DB_URL:             ${{ secrets.DB_URL }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LIVE_TRADING:       'false'   # Never trade during retrain
        run: python -m jobs.train_job
